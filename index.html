<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1B3A5C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TPC">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>TPC &mdash; Consumables Calculator</title>
<style>
  :root {
    --blue: #1B3A5C;
    --blue-light: #2A5580;
    --gray: #555555;
    --alt: #F2F6FA;
    --info: #E8F0F8;
    --green: #1E7A3C;
    --border: #D5DEE8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  html, body { height: 100%; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #EEF2F6;
    color: #222;
    display: flex;
    flex-direction: column;
    touch-action: manipulation;
    overscroll-behavior-y: contain;
  }
  button, input, select { touch-action: manipulation; }
  header {
    background: var(--blue);
    color: #fff;
    padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 16px; font-weight: bold; letter-spacing: 0.3px; }
  header .sub { font-size: 11px; opacity: 0.75; }
  .markup-ctl {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.12);
    border-radius: 8px; padding: 6px 10px;
    font-size: 13px;
  }
  .markup-ctl input {
    width: 58px; font-size: 16px; font-weight: bold; text-align: center;
    border: none; border-radius: 5px; padding: 6px 2px; color: var(--blue);
  }
  main { flex: 1; overflow: hidden; display: flex; flex-direction: column; max-width: 760px; width: 100%; margin: 0 auto; }

  /* Tabs */
  .tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border); }
  .tab {
    flex: 1; text-align: center; padding: 14px 4px; font-size: 15px; font-weight: bold;
    color: var(--gray); cursor: pointer; border-bottom: 3px solid transparent; user-select: none;
    -webkit-user-select: none;
  }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab .badge {
    display: inline-block; min-width: 20px; padding: 1px 6px; margin-left: 5px;
    background: var(--blue); color: #fff; border-radius: 10px; font-size: 12px;
  }
  .tab .badge:empty { display: none; }

  .pane { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; }
  .pane.active { display: block; }

  /* Search pane */
  .searchbar {
    position: sticky; top: 0; background: #EEF2F6; padding: 10px 12px 8px; z-index: 5;
  }
  .searchbar input {
    width: 100%; font-size: 16px; padding: 11px 14px;
    border: 2px solid var(--border); border-radius: 10px; outline: none;
  }
  .searchbar input:focus { border-color: var(--blue-light); }
  .searchbar select {
    width: 100%; font-size: 16px; font-weight: bold; color: var(--blue);
    padding: 11px 12px; margin-bottom: 8px;
    border: 2px solid var(--border); border-radius: 10px; outline: none;
    background: #fff; -webkit-appearance: menulist;
  }
  .cathdr {
    font-size: 12px; font-weight: bold; color: var(--blue);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 10px 4px 6px; border-bottom: 2px solid var(--blue); margin-bottom: 8px;
  }
  .hint { font-size: 11px; color: var(--gray); padding: 5px 2px 0; }
  .results { padding: 0 12px calc(120px + env(safe-area-inset-bottom)); }
  .item {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; margin-bottom: 8px; min-height: 64px;
    display: flex; align-items: center; gap: 10px; cursor: pointer;
  }
  .item:active { background: var(--info); }
  .item .info { flex: 1; min-width: 0; }
  .item .desc { font-size: 14px; font-weight: bold; color: #222; line-height: 1.35; }
  .item .meta { font-size: 11.5px; color: var(--gray); margin-top: 3px; }
  .item .price { text-align: right; white-space: nowrap; }
  .item .price .sell { font-size: 15px; font-weight: bold; color: var(--blue); }
  .item .price .base { font-size: 11.5px; color: var(--gray); }
  .item .addbtn {
    background: var(--blue); color: #fff; border: none; border-radius: 10px;
    width: 46px; height: 46px; font-size: 24px; font-weight: bold; cursor: pointer; flex-shrink: 0;
  }
  .item .addbtn.in { background: var(--green); font-size: 17px; }

  /* Cart pane */
  .cart { padding: 12px 12px 12px; }
  .cartline {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 8px;
  }
  .cartline .top { display: flex; align-items: flex-start; gap: 8px; }
  .cartline .desc { flex: 1; font-size: 13.5px; font-weight: bold; line-height: 1.3; }
  .cartline .rm {
    background: none; border: none; color: #B33; font-size: 24px; cursor: pointer;
    padding: 4px 10px; line-height: 1; margin: -4px -6px 0 0;
  }
  .cartline .bottom {
    display: flex; align-items: center; justify-content: space-between; margin-top: 8px; gap: 8px;
  }
  .qtyctl { display: flex; align-items: center; gap: 0; }
  .qtyctl button {
    width: 46px; height: 46px; font-size: 22px; font-weight: bold;
    background: var(--info); color: var(--blue); border: 1px solid var(--border); cursor: pointer;
  }
  .qtyctl button:first-child { border-radius: 8px 0 0 8px; }
  .qtyctl button:last-child { border-radius: 0 8px 8px 0; }
  .qtyctl input {
    width: 62px; height: 46px; text-align: center; font-size: 16px; font-weight: bold;
    border: 1px solid var(--border); border-left: none; border-right: none; outline: none;
  }
  .qtyctl .unit { font-size: 12px; color: var(--gray); margin-left: 7px; line-height: 1.25; }
  .qtyctl .stick { font-size: 10px; color: #8A97A5; }
  .cartline .linetotal { text-align: right; }
  .cartline .linetotal .sell { font-size: 15px; font-weight: bold; color: var(--blue); }
  .cartline .linetotal .base { font-size: 11px; color: var(--gray); }

  .totals {
    background: #fff; border: 2px solid var(--blue); border-radius: 12px;
    padding: 12px 14px; margin: 4px 0 14px;
  }
  .totals .row { display: flex; justify-content: space-between; font-size: 13.5px; padding: 3px 0; color: var(--gray); }
  .totals .row.grand {
    border-top: 2px solid var(--blue); margin-top: 6px; padding-top: 8px;
    font-size: 18px; font-weight: bold; color: var(--blue);
  }
  .empty { text-align: center; color: var(--gray); font-size: 14px; padding: 40px 20px; }

  /* Copy block */
  .copyblock {
    background: #fff; border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 12px;
  }
  .copyblock h3 { font-size: 12px; color: var(--blue); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .copyblock pre {
    font-family: Arial, Helvetica, sans-serif; font-size: 13px; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word;
    background: var(--alt); border-radius: 8px; padding: 10px 12px; color: #222;
  }
  .bigbtn {
    display: block; width: 100%; padding: 16px; font-size: 17px; font-weight: bold;
    background: var(--blue); color: #fff; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px;
  }
  .bigbtn:active { background: var(--blue-light); }
  .bigbtn.copied { background: var(--green); }
  .clearbtn {
    display: block; width: 100%; padding: 13px; font-size: 14px; font-weight: bold;
    background: none; color: #B33; border: 1.5px solid #D8B4B4; border-radius: 10px; cursor: pointer;
    margin: 2px 0 30px;
  }
  footer {
    text-align: center; font-size: 10px; color: #99A5B1;
    padding: 6px 0 calc(10px + env(safe-area-inset-bottom));
  }

  /* Floating running-total bar (FIND pane, when list has items) */
  .floatbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    max-width: 760px; margin: 0 auto;
    background: var(--blue); color: #fff;
    display: none; align-items: center; justify-content: space-between; gap: 10px;
    padding: 14px 18px calc(14px + env(safe-area-inset-bottom));
    box-shadow: 0 -3px 12px rgba(27,58,92,0.35); cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }
  .floatbar.show { display: flex; }
  .floatbar .fb-items { font-size: 13.5px; opacity: 0.9; }
  .floatbar .fb-total { font-size: 18px; font-weight: bold; }
  .floatbar .fb-go {
    background: #fff; color: var(--blue); font-size: 13px; font-weight: bold;
    border: none; border-radius: 8px; padding: 9px 13px; white-space: nowrap; pointer-events: none;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>CONSUMABLES CALCULATOR</h1>
    <div class="sub">TPC &mdash; Total Power &amp; Controls LLC &middot; <span id="verHdr"></span></div>
  </div>
  <div class="markup-ctl">
    <span>Markup</span>
    <input type="number" id="markup" value="50" min="0" max="200" step="1" inputmode="numeric">
    <span>%</span>
  </div>
</header>

<main>
  <div class="tabs">
    <div class="tab active" id="tab-find" onclick="showPane('find')">FIND ITEMS</div>
    <div class="tab" id="tab-cart" onclick="showPane('cart')">MY LIST<span class="badge" id="cartBadge"></span></div>
  </div>

  <div class="pane active" id="pane-find">
    <div class="searchbar">
      <select id="catsel"></select>
      <input type="search" id="search" placeholder="Search: tape, liquidtight, THHN, strap, wire nut&hellip;" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" enterkeyhint="search">
      <div class="hint">Pick a category or search everything. Tap + to add. Prices per each / per foot.</div>
    </div>
    <div class="results" id="results"></div>
  </div>

  <div class="pane" id="pane-cart">
    <div class="cart" id="cartBody"></div>
  </div>
</main>
<footer><span id="verFtr"></span> &middot; Prices = last Platt cost + markup &middot; catalog through Jun 2026</footer>

<div class="floatbar" id="floatbar" onclick="showPane('cart')">
  <div>
    <div class="fb-items" id="fbItems"></div>
    <div class="fb-total" id="fbTotal"></div>
  </div>
  <button class="fb-go">VIEW LIST &rsaquo;</button>
</div>

, "c": 15}, {"b": "MILWAUKEE", "m": "49-56-0173", "d": "Hole Saw, 3\"", "u": "EA", "p": 22.9, "n": 1, "c": 15}, {"b": "MILWAUKEE", "m": "49-56-0193", "d": "Hole Saw, 3-1/2\"", "u": "EA", "p": 22.9, "n": 1, "c": 15}, {"b": "GREENLEE", "m": "36508", "d": "Knockout Punch Kit", "u": "EA", "p": 99.87, "n": 1, "c": 15}, {"b": "KLEIN TOOLS", "m": "VDV526-100", "d": "LAN Explorer\u2122 Data Cable Tester with Remote", "u": "EA", "p": 29.97, "n": 1, "c": 15}, {"b": "SOUTHWIRE", "m": "PVCHB-13", "d": "PVC Heating Blanket, 13\"", "u": "EA", "p": 162.8, "n": 1, "c": 15}, {"b": "GREENLEE", "m": "648", "d": "Quick Change Carbide Cutter Kit", "u": "EA", "p": 288.88, "n": 1, "c": 15}, {"b": "MILWAUKEE", "m": "48-00-5182", "d": "6\" Reciprocating Saw Blade", "u": "EA", "p": 13.12, "n": 1, "c": 15}, {"b": "MILWAUKEE", "m": "48-00-5187", "d": "Reciprocating Saw Blade, 9\"", "u": "EA", "p": 15.47, "n": 1, "c": 15}, {"b": "MILWAUKEE", "m": "49-22-1105", "d": "SAWZALL\u00ae Demolition Blade Set - 5PC", "u": "EA", "p": 15.97, "n": 1, "c": 15}, {"b": "PLATINUM TOOLS", "m": "10531C", "d": "5\" Side Cutting Pliers", "u": "EA", "p": 11.0, "n": 1, "c": 15}, {"b": "MILWAUKEE", "m": "48-22-8931", "d": "Cut Level 3 Nitrile Dipped Gloves, Medium", "u": "EA", "p": 8.76, "n": 1, "c": 16}, {"b": "DOTTIE", "m": "8NG100L", "d": "Diamond Texture Black Nitrile Disposable Gloves 8Mil, Large", "u": "EA", "p": 25.11, "n": 1, "c": 16}, {"b": "W MARKETING", "m": "20EZTABS", "d": "EZ Tabs for NEC\u00ae Code Book", "u": "EA", "p": 27.91, "n": 1, "c": 16}, {"b": "KLEIN TOOLS", "m": "51425", "d": "Hand Cleaning Towel - 72 Wipes per Bucket", "u": "EA", "p": 19.99, "n": 1, "c": 16}, {"b": "LIFT SAFETY", "m": "GHR-17YBR1L", "d": "Handler Glove, Grey, X-Large", "u": "EA", "p": 26.73, "n": 1, "c": 16}, {"b": "IDEAL", "m": "38-500", "d": "IDEAL\u00ae Wipes", "u": "EA", "p": 24.44, "n": 2, "c": 16}, {"b": "DOTTIE", "m": "RGZ2", "d": "White Knit Rags, Medium Weight - 2lb Bag", "u": "EA", "p": 23.4, "n": 5, "c": 16}, {"b": "W MARKETING", "m": "7023SB", "d": "NFPA 70 Codebook, 2023 Edition, Softbound", "u": "EA", "p": 158.16, "n": 1, "c": 16}, {"b": "W MARKETING", "m": "9781284275919", "d": "Ugly's Electrical References, 2023 Edition", "u": "EA", "p": 34.82, "n": 1, "c": 16}];
const APP_VERSION = 'v3';  // bump on every deployed update — keep in sync with sw.js CACHE_VERSION
const APP_DATE = 'Jul 23, 2026';
const CATS =["WIRE & CABLE", "CONDUIT, FLEX & RACEWAY", "EMT FITTINGS", "RIGID & THREADED FITTINGS", "PVC FITTINGS & CEMENT", "LIQUIDTIGHT & CORD CONNECTORS", "CONDUIT BODIES, COVERS & GASKETS", "STRAPS, CLAMPS & STRUT", "FASTENERS & HARDWARE", "TERMINALS, LUGS & WIRE CONNECTORS", "TAPE, SEALANTS & CHEMICALS", "CABLE TIES & MOUNTS", "LABELS & MARKING", "ENCLOSURE HARDWARE & DEVICES", "PULLING EQUIPMENT", "TOOLS & BITS", "SHOP & SAFETY SUPPLIES"];

// UOM: price divisor -> per-entry-unit, and the unit label crews enter quantities in
const UOM = {
  'EA': { div: 1,    unit: 'ea' },
  'C':  { div: 100,  unit: 'ea' },
  'M':  { div: 1000, unit: 'ft' }
};

let cart = [];      // {idx, qty}
let query = '';
let catFilter = -1; // -1 = all categories

const $ = id => document.getElementById(id);

function unitPrice(item) { return item.p / (UOM[item.u] ? UOM[item.u].div : 1); }
function unitLabel(item) { return item.ul || (UOM[item.u] ? UOM[item.u].unit : 'ea'); }
function stepOf(item) { return item.st || 1; }  // e.g. stick conduit adds in 10-ft increments
function snapQty(item, v) {
  const st = stepOf(item);
  if (!isFinite(v) || v <= 0) return st;
  return st > 1 ? Math.max(st, Math.ceil(v / st) * st) : v;
}
function markupPct() {
  const v = parseFloat($('markup').value);
  return isFinite(v) && v >= 0 ? v : 0;
}
function marked(x) { return x * (1 + markupPct() / 100); }

function fmt(x) { // currency, extra precision under $1 so small per-ea prices aren't shown as $0.00
  if (x > 0 && x < 1) return '$' + x.toFixed(3);
  return '$' + x.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmt2(x) {
  return '$' + x.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function inCart(idx) { return cart.some(c => c.idx === idx); }

function renderResults() {
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  let matches = [];
  for (let i = 0; i < CATALOG.length; i++) {
    const it = CATALOG[i];
    if (catFilter >= 0 && it.c !== catFilter) continue;
    const hay = (it.d + ' ' + it.b + ' ' + it.m).toLowerCase();
    if (terms.every(t => hay.includes(t))) matches.push(i);
  }
  // "All categories" + no search: most-used first, capped. Category view / search: keep type-then-size catalog order.
  if (catFilter < 0 && !terms.length) {
    matches.sort((a, b) => CATALOG[b].n - CATALOG[a].n);
  }
  if (matches.length > 80) matches = matches.slice(0, 80);
  const el = $('results');
  if (!matches.length) {
    el.innerHTML = '<div class="empty">No matches. Try fewer or different words &mdash; e.g. "conn 1/2" or "tape".</div>';
    return;
  }
  let lastCat = -1;
  el.innerHTML = matches.map(i => {
    const catHdr = (CATALOG[i].c !== lastCat && (catFilter < 0 && terms.length))
      ? `<div class="cathdr">${esc(CATS[CATALOG[i].c] || 'OTHER')}</div>` : '';
    lastCat = CATALOG[i].c;
    return catHdr + itemCard(i);
  }).join('');
}

function itemCard(i) {
    const it = CATALOG[i];
    const up = unitPrice(it);
    const added = inCart(i);
    return `<div class="item" onclick="addItem(${i})">
      <div class="info">
        <div class="desc">${esc(it.d)}</div>
        <div class="meta">${esc(it.b)}${it.m ? ' &middot; ' + esc(it.m) : ''}</div>
      </div>
      <div class="price">
        <div class="sell">${fmt(marked(up))}/${unitLabel(it)}</div>
        <div class="base">cost ${fmt(up)}</div>
      </div>
      <button class="addbtn${added ? ' in' : ''}">${added ? '&#10003;' : '+'}</button>
    </div>`;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function addItem(idx) {
  const st = stepOf(CATALOG[idx]);
  const existing = cart.find(c => c.idx === idx);
  if (existing) { existing.qty += st; }
  else { cart.push({ idx, qty: st }); }
  renderAll();
}

function removeLine(pos) { cart.splice(pos, 1); renderAll(); }
function bump(pos, delta) {
  const st = stepOf(CATALOG[cart[pos].idx]);
  cart[pos].qty = Math.max(st, (cart[pos].qty || st) + delta * st);
  renderAll();
}
function setQty(pos, val) {
  cart[pos].qty = snapQty(CATALOG[cart[pos].idx], parseFloat(val));
  renderTotalsOnly();
}
function clearCart() { cart = []; renderAll(); showPane('find'); }

function computeTotals() {
  let base = 0;
  cart.forEach(c => { base += unitPrice(CATALOG[c.idx]) * c.qty; });
  return { base, sell: marked(base) };
}

function tsheetsText() {
  const lines = ['Materials:'];
  cart.forEach(c => {
    const it = CATALOG[c.idx];
    const u = unitLabel(it);
    const q = c.qty % 1 === 0 ? c.qty : c.qty.toFixed(1);
    lines.push(`(${q}${u === 'ft' ? ' ft' : ''}) ${it.d}`);
  });
  const t = computeTotals();
  lines.push(`Consumables: ${fmt2(t.sell)}`);
  return lines.join('\n');
}

function renderCart() {
  const el = $('cartBody');
  $('cartBadge').textContent = cart.length ? cart.length : '';
  if (!cart.length) {
    el.innerHTML = '<div class="empty">Nothing added yet.<br><br>Go to <b>FIND ITEMS</b>, search, and tap + on what you used today.</div>';
    return;
  }
  const t = computeTotals();
  let html = cart.map((c, pos) => {
    const it = CATALOG[c.idx];
    const up = unitPrice(it);
    return `<div class="cartline">
      <div class="top">
        <div class="desc">${esc(it.d)}</div>
        <button class="rm" onclick="removeLine(${pos})" title="Remove">&times;</button>
      </div>
      <div class="bottom">
        <div class="qtyctl">
          <button onclick="bump(${pos},-1)">&minus;</button>
          <input type="number" inputmode="decimal" min="${stepOf(it)}" step="${stepOf(it)}" value="${c.qty}" onchange="setQty(${pos}, this.value); renderAll();">
          <button onclick="bump(${pos},1)">+</button>
          <span class="unit">${unitLabel(it)}${stepOf(it) > 1 ? `<br><span class="stick">10&apos; sticks</span>` : ''}</span>
        </div>
        <div class="linetotal">
          <div class="sell" data-line="${pos}">${fmt2(marked(up * c.qty))}</div>
          <div class="base">cost ${fmt2(up * c.qty)}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  html += `<div class="totals">
    <div class="row"><span>Material cost</span><span id="tBase">${fmt2(t.base)}</span></div>
    <div class="row"><span>Markup (${markupPct()}%)</span><span id="tMk">${fmt2(t.sell - t.base)}</span></div>
    <div class="row grand"><span>CONSUMABLES TOTAL</span><span id="tSell">${fmt2(t.sell)}</span></div>
  </div>`;

  html += `<div class="copyblock">
    <h3>Paste into TSheets description</h3>
    <pre id="tsPreview">${esc(tsheetsText())}</pre>
    <button class="bigbtn" id="copyBtn" onclick="copyTS()">COPY FOR TSHEETS</button>
  </div>
  <button class="clearbtn" onclick="clearCart()">Clear list / start new entry</button>`;

  el.innerHTML = html;
}

function renderTotalsOnly() { renderCart(); }

function copyTS() {
  const text = tsheetsText();
  const done = ok => {
    const b = $('copyBtn');
    if (!b) return;
    b.textContent = ok ? '✓ COPIED — PASTE IN TSHEETS' : 'COPY FAILED — SELECT & COPY ABOVE';
    b.classList.add('copied');
    setTimeout(() => { b.textContent = 'COPY FOR TSHEETS'; b.classList.remove('copied'); }, 2200);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => done(true)).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
  done(ok);
}

let activePane = 'find';
function showPane(which) {
  activePane = which;
  ['find','cart'].forEach(p => {
    $('pane-' + p).classList.toggle('active', p === which);
    $('tab-' + p).classList.toggle('active', p === which);
  });
  if (which === 'cart') renderCart();
  renderFloatbar();
}

function renderFloatbar() {
  const fb = $('floatbar');
  if (activePane === 'find' && cart.length) {
    const t = computeTotals();
    let qty = 0; cart.forEach(c => qty += 1);
    $('fbItems').textContent = qty + (qty === 1 ? ' item' : ' items') + ' on list';
    $('fbTotal').textContent = fmt2(t.sell) + ' w/ markup';
    fb.classList.add('show');
  } else {
    fb.classList.remove('show');
  }
}

function renderAll() { renderResults(); renderCart(); renderFloatbar(); }

// populate category dropdown
$('catsel').innerHTML = '<option value="-1">ALL CATEGORIES</option>' +
  CATS.map((c, i) => `<option value="${i}">${esc(c)}</option>`).join('');
$('catsel').addEventListener('change', e => {
  catFilter = parseInt(e.target.value, 10);
  renderResults();
  $('pane-find').scrollTop = 0;
});
$('search').addEventListener('input', e => { query = e.target.value; renderResults(); });
$('markup').addEventListener('input', renderAll);

$('verHdr').textContent = APP_VERSION;
$('verFtr').textContent = APP_VERSION + ' (' + APP_DATE + ')';
renderAll();

// Offline + install support (only runs when served from a website, not when opened as a file)
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
